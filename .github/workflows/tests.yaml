---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxmlsec1-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements_test.txt

      - name: Run unit + integration tests
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@localhost:5432/test_uber
        run: python3 -m pytest tests/uber/ -x --timeout=300 -q

  visual-regression:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build visual test image
        run: docker build -f Dockerfile.visual -t ubersystem-visual .

      - name: Create output directories
        run: mkdir -p tests/visual/results

      - name: Run visual regression tests
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/tests/visual/baselines:/app/tests/visual/baselines \
            -v ${{ github.workspace }}/tests/visual/results:/app/tests/visual/results \
            ubersystem-visual \
            python3 -m pytest tests/visual/ --timeout=300 -v --tb=short

      - name: Upload diff screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: tests/visual/results/
          retention-days: 7

  visual-update-baselines:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build visual test image
        run: docker build -f Dockerfile.visual -t ubersystem-visual .

      - name: Update baselines
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/tests/visual/baselines:/app/tests/visual/baselines \
            ubersystem-visual \
            python3 -m pytest tests/visual/ --update-baselines --timeout=300 -v

      - name: Commit updated baselines
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update visual regression baselines"
          file_pattern: tests/visual/baselines/*.png
