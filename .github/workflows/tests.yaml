---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxmlsec1-dev pkg-config

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test.txt

      - name: Run unit + integration tests
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@localhost:5432/test_uber
        run: python3 -m pytest tests/uber/ -x --timeout=300 -q

  # ---------------------------------------------------------------------------
  # Visual: capture current screenshots (every push and every PR)
  # ---------------------------------------------------------------------------
  visual-capture:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.50.0-noble
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libxml2-dev libxmlsec1-dev pkg-config curl

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test_visual.txt

      - name: Create output directories
        run: mkdir -p tests/visual/baselines tests/visual/results

      - name: Capture screenshots
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
        run: python3 -m pytest tests/visual/ --update-baselines --timeout=300 -q

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: tests/visual/baselines/
          retention-days: 90
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Visual: compare each chunk against target branch (PRs only, parallel)
  # ---------------------------------------------------------------------------
  visual-compare:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.50.0-noble
    permissions:
      contents: read
      actions: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        chunk:
          - registration-badges
          - art-hotel
          - staffing-departments
          - events-games
          - admin-misc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libxml2-dev libxmlsec1-dev pkg-config curl

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test_visual.txt

      - name: Create output directories
        run: mkdir -p tests/visual/baselines tests/visual/results

      - name: Download target branch baselines
        id: baselines
        run: |
          FOUND=false
          TARGET="${{ github.base_ref || 'main' }}"
          for RUN_ID in $(gh run list \
              --workflow tests.yaml \
              --branch "$TARGET" \
              --limit 5 \
              --json databaseId \
              --jq '.[].databaseId'); do
            if gh run download "$RUN_ID" \
                --name visual-screenshots \
                --dir /tmp/baseline-download 2>/dev/null; then
              mv /tmp/baseline-download/visual-screenshots/* tests/visual/baselines/
              FOUND=true
              echo "Restored baselines from run $RUN_ID on $TARGET"
              break
            fi
          done
          echo "found=$FOUND" >> $GITHUB_OUTPUT
          [ "$FOUND" != "true" ] && echo "No artifact found for $TARGET — will capture from target branch"
        env:
          GH_TOKEN: ${{ github.token }}

      # First-run fallback: capture baselines from the target branch code.
      # Checks out the target branch into /tmp/target and runs --update-baselines.
      - name: Capture target branch baselines (first-run fallback)
        if: steps.baselines.outputs.found != 'true'
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          TARGET="${{ github.base_ref || 'main' }}"
          git fetch origin "$TARGET"
          mkdir -p /tmp/target
          git --work-tree=/tmp/target checkout FETCH_HEAD -- .
          uv pip install --system \
            -r /tmp/target/requirements.txt \
            -r /tmp/target/requirements_test_visual.txt \
            --quiet
          PYTHONPATH=/tmp/target python3 -m pytest /tmp/target/tests/visual/ \
            --visual-chunk ${{ matrix.chunk }} \
            --update-baselines --timeout=300 -q \
            --rootdir=/tmp/target
          cp /tmp/target/tests/visual/baselines/* tests/visual/baselines/ 2>/dev/null || true
          # Restore current branch deps
          uv pip install --system -r requirements.txt -r requirements_test_visual.txt --quiet

      - name: Compare chunk against target branch
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
        run: |
          python3 -m pytest tests/visual/ \
            --visual-chunk ${{ matrix.chunk }} \
            --timeout=300 -q --tb=short

      - name: Upload comparison results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ matrix.chunk }}
          path: tests/visual/results/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Visual: aggregate diffs and post a PR comment
  # ---------------------------------------------------------------------------
  visual-report:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    needs: [visual-compare]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all diff artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: visual-diff-*
          path: artifacts/
          merge-multiple: false

      - name: Generate report
        run: python3 tests/visual/generate_report.py artifacts/ > /tmp/report_body.md

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report_body.md', 'utf8');
            const marker = '<!-- visual-regression-report -->';
            const pr = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
