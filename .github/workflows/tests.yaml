---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxmlsec1-dev pkg-config

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test.txt

      - name: Run unit + integration tests
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@localhost:5432/test_uber
        run: python3 -m pytest tests/uber/ -x --timeout=300 -q

  # ---------------------------------------------------------------------------
  # Visual: capture current screenshots (every push and every PR)
  # ---------------------------------------------------------------------------
  visual-capture:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libxml2-dev libxmlsec1-dev pkg-config curl

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test_visual.txt

      - name: Create output directories
        run: mkdir -p tests/visual/baselines tests/visual/results

      - name: Capture screenshots
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
        run: python3 -m pytest tests/visual/ --update-baselines --timeout=300 -q

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: tests/visual/baselines/
          retention-days: 90
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Visual: compare each chunk against target branch (PRs only, parallel)
  # ---------------------------------------------------------------------------
  visual-compare:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    permissions:
      contents: read
      actions: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_uber
          POSTGRES_PASSWORD: test_uber
          POSTGRES_DB: test_uber
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        chunk:
          - registration-badges
          - art-hotel
          - staffing-departments
          - events-games
          - admin-misc

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libxml2-dev libxmlsec1-dev pkg-config curl

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt -r requirements_test_visual.txt

      - name: Create output directories
        run: mkdir -p tests/visual/baselines tests/visual/results

      - name: Download target branch baselines
        id: baselines
        run: |
          FOUND=false
          TARGET="${{ github.base_ref || 'main' }}"
          for RUN_ID in $(gh run list \
              --workflow tests.yaml \
              --branch "$TARGET" \
              --limit 5 \
              --json databaseId \
              --jq '.[].databaseId'); do
            if gh run download "$RUN_ID" \
                --name visual-screenshots \
                --dir /tmp/baseline-download 2>/dev/null; then
              mv /tmp/baseline-download/visual-screenshots/* tests/visual/baselines/
              FOUND=true
              echo "Restored baselines from run $RUN_ID on $TARGET"
              break
            fi
          done
          echo "found=$FOUND" >> $GITHUB_OUTPUT
          [ "$FOUND" != "true" ] && echo "No artifact found for $TARGET — will capture from target branch"
        env:
          GH_TOKEN: ${{ github.token }}

      # First-run fallback: capture baselines from the target branch code.
      # Checks out the target branch into /tmp/target and runs --update-baselines.
      - name: Capture target branch baselines (first-run fallback)
        if: steps.baselines.outputs.found != 'true'
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          TARGET="${{ github.base_ref || 'main' }}"
          git fetch origin "$TARGET"
          mkdir -p /tmp/target
          git --work-tree=/tmp/target checkout FETCH_HEAD -- .
          # Install target branch app deps only — skip playwright since it must
          # match the container image and is already installed.
          uv pip install --system \
            -r /tmp/target/requirements.txt \
            -r /tmp/target/requirements_test.txt \
            --quiet
          PYTHONPATH=/tmp/target python3 -m pytest /tmp/target/tests/visual/ \
            --visual-chunk ${{ matrix.chunk }} \
            --update-baselines --timeout=300 -q \
            --rootdir=/tmp/target
          cp /tmp/target/tests/visual/baselines/* tests/visual/baselines/ 2>/dev/null || true
          # Restore current branch deps
          uv pip install --system -r requirements.txt -r requirements_test.txt --quiet

      - name: Compare chunk against target branch
        env:
          DATABASE_URL: postgresql://test_uber:test_uber@postgres/test_uber
          UBER_CONFIG_FILES: test-defaults.ini
        run: |
          python3 -m pytest tests/visual/ \
            --visual-chunk ${{ matrix.chunk }} \
            --timeout=300 -q --tb=short

      - name: Upload comparison results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ matrix.chunk }}
          path: tests/visual/results/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Visual: aggregate diffs and post a PR comment
  # ---------------------------------------------------------------------------
  visual-report:
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    needs: [visual-compare]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write   # needed to push composite images to visual-regression-images branch

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Pillow
        run: uv pip install --system Pillow

      - name: Download all diff artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: visual-diff-*
          path: artifacts/
          merge-multiple: false

      - name: Generate composites and report data
        run: python3 tests/visual/generate_report.py artifacts/ composites/

      # Push composite images to the visual-regression-images orphan branch so they
      # get stable raw.githubusercontent.com URLs that render inline in GitHub comments.
      # The uploads.github.com issue-assets endpoint rejects GITHUB_TOKEN with 422
      # regardless of encoding, so git push is the reliable alternative.
      - name: Push composite images to visual-regression-images branch
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          WORKSPACE="$GITHUB_WORKSPACE"

          # Work in a temp clone so we don't disturb the main checkout
          WORK_DIR=$(mktemp -d)
          git clone --depth=1 --no-single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
            "$WORK_DIR"
          cd "$WORK_DIR"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Checkout or create the dedicated images branch
          if git checkout visual-regression-images 2>/dev/null; then
            echo "Checked out existing visual-regression-images branch"
          else
            git checkout --orphan visual-regression-images
            git rm -rf . > /dev/null 2>&1 || true
            echo "Created new orphan visual-regression-images branch"
          fi

          # Copy composites under pr-{PR}/{run_id}/
          mkdir -p "pr-${PR}/${RUN_ID}"
          cp "${WORKSPACE}"/composites/*.jpg "pr-${PR}/${RUN_ID}/" 2>/dev/null || true

          git add "pr-${PR}/${RUN_ID}/"
          if git diff --cached --quiet; then
            echo "No composites to commit"
          else
            git commit -m "Visual regression composites — PR ${PR} run ${RUN_ID}"
            git push origin visual-regression-images
          fi

          # Build upload_urls.json mapping filename -> raw CDN URL
          echo '{}' > "${WORKSPACE}/composites/upload_urls.json"
          for img in "pr-${PR}/${RUN_ID}"/*.jpg; do
            [ -f "$img" ] || continue
            name=$(basename "$img")
            url="https://raw.githubusercontent.com/${REPO}/visual-regression-images/${img}"
            jq --arg k "$name" --arg v "$url" '.[$k]=$v' \
              "${WORKSPACE}/composites/upload_urls.json" > /tmp/urls_tmp.json \
              && mv /tmp/urls_tmp.json "${WORKSPACE}/composites/upload_urls.json"
            echo "  $name -> $url"
          done

          echo "--- upload_urls.json ---"
          cat "${WORKSPACE}/composites/upload_urls.json"

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const MARKER = '<!-- visual-regression-report -->';
            const pr    = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const reportData = JSON.parse(fs.readFileSync('composites/report_data.json', 'utf8'));
            const uploadUrls = JSON.parse(
              fs.existsSync('composites/upload_urls.json')
                ? fs.readFileSync('composites/upload_urls.json', 'utf8')
                : '{}'
            );
            const { has_changes, total_changed, composites, top_50 } = reportData;

            let body = `${MARKER}\n## Visual Regression\n\n`;

            if (!has_changes) {
              body += '✅ No significant visual changes detected.\n';
            } else {
              const routeWord = total_changed === 1 ? 'route' : 'routes';
              body += `**${total_changed} ${routeWord} changed** (threshold: 0.2%):\n\n`;

              // Top-5 side-by-side composite images
              for (const comp of composites) {
                const pct = (comp.ratio * 100).toFixed(2);
                body += `### \`${comp.label}\` — ${pct}% changed\n\n`;
                const imageUrl = uploadUrls[comp.filename];
                if (imageUrl) {
                  body += `![${comp.label} before/after](${imageUrl})\n\n`;
                } else {
                  body += `*(image unavailable — see \`visual-diff-${comp.chunk}\` artifact)*\n\n`;
                }
              }

              // Top-50 table
              const tableCount = Math.min(total_changed, 50);
              body += `---\n\n### All Changed Routes`;
              body += total_changed > 50
                ? ` (top ${tableCount} of ${total_changed})`
                : ` (${tableCount})`;
              body += `\n\n| Route | Diff % | Chunk |\n|-------|--------|-------|\n`;
              for (const d of top_50) {
                const pct = (d.ratio * 100).toFixed(2);
                body += `| \`${d.label}\` | ${pct}% | ${d.chunk} |\n`;
              }
              if (total_changed > 50) {
                body += `\n*…and ${total_changed - 50} more routes changed.*\n`;
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
              console.log('Created comment');
            }
