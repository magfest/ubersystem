---
name: Build Docker Image

on:
  push:
    branches: [touhoufest2027]
  pull_request:
    branches: [touhoufest2027]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Container
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set sanitized image repository and tag
        run: |
          IMAGE_REPO=$(echo "${{ vars.UBER_REPO || github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "IMAGE_REPOSITORY=$IMAGE_REPO" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'touhoufest2027' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          build-args: BRANCH=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          context: "."
          push: ${{ github.event_name != 'pull_request' && github.ref_name == 'touhoufest2027' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Ubersystem Docker image for ${{ github.ref_name }}

      - name: Generate Deployment Token
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'touhoufest2027' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID || secrets.APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY || secrets.APP_PRIVATE_KEY }}
          owner: TouhouFest

      - name: Trigger Deployment Pipeline
        if: ${{ github.event_name != 'pull_request' && github.ref_name == 'touhoufest2027' }}
        uses: actions/github-script@v7
        env:
          TARGET_REPO: ${{ secrets.DEPLOY_REPO }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const targetRepo = process.env.TARGET_REPO;
            if (targetRepo) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: targetRepo,
                workflow_id: 'deploy.yaml',
                ref: 'work',
              });
            }
