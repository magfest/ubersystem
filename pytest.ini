[pytest]
timeout = 30
timeout_method = thread
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
filterwarnings =
    ignore::DeprecationWarning:testcontainers
    ignore:builtin type Swig.*has no __module__:DeprecationWarning
    ignore:invalid escape sequence:SyntaxWarning
    ignore:ensure_list is deprecated:UserWarning
    ignore:groupify is deprecated:UserWarning
    ignore:.*will not make use of SQL compilation caching:
